version: 2

models:
  - name: stg_orders
    description: Typed order headers at one row per order.
    columns:
      - name: order_id
        data_tests:
          - not_null
          - unique
      - name: customer_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id
      - name: order_status
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - approved
                  - canceled
                  - created
                  - delivered
                  - invoiced
                  - processing
                  - shipped
                  - unavailable
      - name: order_purchase_at
        data_tests:
          - not_null

  - name: stg_order_items
    description: Typed order lines at one row per order and item sequence.
    columns:
      - name: order_item_sk
        data_tests:
          - not_null
          - unique
      - name: order_id
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id
      - name: product_id
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id
      - name: seller_id
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_sellers')
                field: seller_id

  - name: stg_order_payments
    description: Typed payment records at one row per order and payment sequence.
    columns:
      - name: payment_sk
        data_tests:
          - not_null
          - unique
      - name: order_id
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id

  - name: stg_order_reviews
    description: Latest typed review record retained for each review identifier.
    columns:
      - name: review_id
        data_tests:
          - not_null
          - unique
      - name: order_id
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id
      - name: review_score
        data_tests:
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5]

  - name: stg_customers
    description: Typed customer order identities with the reusable customer identifier retained.
    columns:
      - name: customer_id
        data_tests:
          - not_null
          - unique
      - name: customer_unique_id
        data_tests:
          - not_null

  - name: stg_products
    columns:
      - name: product_id
        data_tests:
          - not_null
          - unique

  - name: stg_sellers
    columns:
      - name: seller_id
        data_tests:
          - not_null
          - unique

  - name: stg_geolocation
    description: Geography collapsed to one representative row per ZIP-code prefix.
    columns:
      - name: zip_code_prefix
        data_tests:
          - not_null
          - unique
