version: 2

models:
  - name: dim_date
    description: Calendar dimension covering the loaded order lifecycle date range.
    columns:
      - name: date_key
        data_tests:
          - not_null
          - unique
      - name: date_day
        data_tests:
          - not_null
          - unique

  - name: dim_customers
    columns:
      - name: customer_id
        data_tests:
          - not_null
          - unique

  - name: dim_products
    columns:
      - name: product_id
        data_tests:
          - not_null
          - unique

  - name: dim_sellers
    columns:
      - name: seller_id
        data_tests:
          - not_null
          - unique

  - name: dim_geography
    columns:
      - name: zip_code_prefix
        data_tests:
          - not_null
          - unique

  - name: fct_orders
    description: Order-grain fact table with item, payment, and review rollups.
    columns:
      - name: order_id
        data_tests:
          - not_null
          - unique
      - name: customer_id
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id
      - name: order_purchase_date
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_day

  - name: fct_order_items
    description: Revenue fact table at one row per order line.
    columns:
      - name: order_item_sk
        data_tests:
          - not_null
          - unique
      - name: order_id
        data_tests:
          - relationships:
              arguments:
                to: ref('fct_orders')
                field: order_id
      - name: product_id
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_id
      - name: seller_id
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_sellers')
                field: seller_id
